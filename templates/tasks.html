<script src="/static/js/sidebar-active.js" defer></script>

<!-- Main Content -->
    <main class="main-content">
      <!-- Header -->
      
      <!-- Page Content -->
      <div class="page-content">
        <!-- Header Actions -->
        <div class="customers-header-actions">
          <div></div>
          <button class="btn btn-primary" id="btnAdd">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 6px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Assign Order to Tailor
          </button>
        </div>

        <!-- Tasks Table Card -->
        <div class="dashboard-card">
          <div class="table-responsive">
            <table class="customers-table">
              <thead>
                <tr>
                  <th>Order</th>
                  <th>Assigned To</th>
                  <th>Status</th>
                  <th>Progress</th>

              </thead>

          </div>
        </div>

  <!-- Modals -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Assign Order to Tailor</h3>
        <button class="btn btn-secondary btn-sm" id="closeModal">✕</button>
      </div>
      <form id="form">
        <div class="form-group"><label>Order *</label><select id="order_id" required></select></div>
        <div class="form-group"><label>Assign to (Tailor) *</label><select id="assigned_to" required></select></div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Assign</button>
        </div>
      </form>
    </div>
  </div>
  <div id="modalUpdate" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Update Task</h3>
        <button class="btn btn-secondary btn-sm" id="closeUpdate">✕</button>
      </div>
      <form id="formUpdate">
        <input type="hidden" id="taskId">
        <div class="form-group"><label>Status</label><select id="taskStatus"><option value="assigned">Assigned</option><option value="in_progress">In Progress</option><option value="completed">Completed</option></select></div>
        <div class="form-group"><label>Progress Notes</label><textarea id="progress_notes" rows="3"></textarea></div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelUpdateBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Update</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/avatar.js"></script>
  <script src="/static/js/theme.js"></script>
  <script src="/static/js/notifications.js"></script>
  <script>
    let user = requireAuth();
    if (!user) { throw new Error('Auth required'); }
    initAvatarFromApi(user);
    
    // Theme toggle in sidebar
    (function() {
      initTheme();
      var btn = document.getElementById('sidebarThemeBtn');
      if (btn) {
        btn.textContent = getTheme() === 'light' ? '\u{1F319}' : '\u{1F506}';
        btn.onclick = function() { toggleTheme(); btn.textContent = getTheme() === 'light' ? '\u{1F319}' : '\u{1F506}'; };
      }
    })();
    
    // Logout (sidebar and header)
    document.getElementById('sidebarLogout').addEventListener('click', function(e) {
      e.preventDefault();
      logout();
    });
    document.getElementById('headerLogoutBtn').addEventListener('click', function() {
      logout();
    });

    // User dropdown (header)
    (function() {
      var profile = document.getElementById('userProfile');
      var menu = document.getElementById('userDropdownMenu');
      function open() { menu.classList.add('show'); menu.setAttribute('aria-hidden', 'false'); profile.setAttribute('aria-expanded', 'true'); }
      function close() { menu.classList.remove('show'); menu.setAttribute('aria-hidden', 'true'); profile.setAttribute('aria-expanded', 'false'); }
      function toggle() { if (menu.classList.contains('show')) close(); else { open(); notifClose(); } }
      profile.addEventListener('click', function(e) { e.stopPropagation(); toggle(); });
      document.addEventListener('click', function(e) {
        if (!profile.contains(e.target) && !menu.contains(e.target)) close();
      });
      menu.addEventListener('click', function(e) { e.stopPropagation(); });
    })();

    // Notification panel
    var notifPanel = document.getElementById('notificationPanel');
    var notifBtn = document.getElementById('notificationBtn');
    var headerUserWrapNotif = notifBtn.closest('.header-user-wrap');
    function notifClose() { notifPanel.classList.remove('show'); notifPanel.setAttribute('aria-hidden', 'true'); }
    function notifToggle() {
      if (notifPanel.classList.contains('show')) notifClose();
      else {
        notifPanel.classList.add('show');
        notifPanel.setAttribute('aria-hidden', 'false');
        document.getElementById('userDropdownMenu').classList.remove('show');
      }
    }
    notifBtn.addEventListener('click', function(e) { e.stopPropagation(); notifToggle(); });
    document.addEventListener('click', function(e) {
      if (!headerUserWrapNotif.contains(e.target)) notifClose();
    });

    // Hide admin-only nav
    if (user.role !== 'admin') document.querySelectorAll('.nav-admin-only').forEach(el => el.classList.add('hidden'));

    // Tasks page logic
    let staff = [], orders = [];
    async function loadOptions() {
      const [s, o] = await Promise.all([api('/auth/staff'), api('/orders?per_page=500')]);
      staff = s || [];
      orders = (o.items || []).filter(x => x.status !== 'cancelled' && x.status !== 'delivered');
      document.getElementById('assigned_to').innerHTML = staff.filter(u => u.role === 'tailor').map(u => `<option value="${u.id}">${u.full_name || u.username}</option>`).join('') || '<option value="">No tailors</option>';
      document.getElementById('order_id').innerHTML = '<option value="">Select order</option>' + orders.map(o => `<option value="${o.id}">#${o.id} ${o.customer ? o.customer.full_name : ''} - ${o.clothing_type}</option>`).join('');
    }
    document.getElementById('btnAdd').onclick = () => { document.getElementById('modal').classList.remove('hidden'); };
    document.getElementById('closeModal').onclick = () => document.getElementById('modal').classList.add('hidden');
    document.getElementById('cancelBtn').onclick = () => document.getElementById('modal').classList.add('hidden');
    document.getElementById('form').onsubmit = async (e) => {
      e.preventDefault();
      try {
        await api('/tasks', { method: 'POST', body: JSON.stringify({ order_id: parseInt(document.getElementById('order_id').value), assigned_to: parseInt(document.getElementById('assigned_to').value) }) });
        document.getElementById('modal').classList.add('hidden');
        showToast('Task assigned', 'success');
        loadOptions();
        load();
      } catch (err) { showToast(err.message || 'Failed to assign task', 'error'); }
    };
    function openUpdate(task) {
      document.getElementById('taskId').value = task.id;
      document.getElementById('taskStatus').value = task.status;
      document.getElementById('progress_notes').value = task.progress_notes || '';
      document.getElementById('modalUpdate').classList.remove('hidden');
    }
    document.getElementById('closeUpdate').onclick = () => document.getElementById('modalUpdate').classList.add('hidden');
    document.getElementById('cancelUpdateBtn').onclick = () => document.getElementById('modalUpdate').classList.add('hidden');
    document.getElementById('formUpdate').onsubmit = async (e) => {
      e.preventDefault();
      await api('/tasks/' + document.getElementById('taskId').value, { method: 'PUT', body: JSON.stringify({ status: document.getElementById('taskStatus').value, progress_notes: document.getElementById('progress_notes').value }) });
      document.getElementById('modalUpdate').classList.add('hidden');
      load();
    };
    async function load() {
      try {
        const list = await api('/tasks');
        const staffMap = {}; staff.forEach(u => staffMap[u.id] = u);
        function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        document.getElementById('list').innerHTML = (list || []).map(t => `
        <tr>
          <td><strong>#${t.order ? t.order.id : t.order_id}</strong> ${escapeHtml(t.order && t.order.customer ? t.order.customer.full_name : '')} ${escapeHtml(t.order ? t.order.clothing_type : '')}</td>
          <td>${escapeHtml(t.assigned_user ? (t.assigned_user.full_name || t.assigned_user.username) : t.assigned_to)}</td>
          <td><span class="badge badge-${t.status === 'completed' ? 'completed' : 'progress'}">${escapeHtml(t.status)}</span></td>
          <td>${escapeHtml((t.progress_notes || '').slice(0, 50))}</td>
          <td class="text-right">
            <button class="btn btn-secondary btn-sm" onclick='openUpdate(${JSON.stringify(t).replace(/'/g, "\\'")})'>Update</button>
          </td>
        </tr>
      `).join('') || '<tr><td colspan="5" style="text-align:center; padding: 24px; color: var(--text-muted);">No tasks found</td></tr>';
      } catch (err) {
        showToast(err.message || 'Failed to load tasks', 'error');
        document.getElementById('list').innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 24px; color: var(--text-muted);">Failed to load tasks</td></tr>';
      }
    }
    loadOptions().then(load);
  </script>
</body>
</html>
