{# active_page set by routes/pages.py #}
{% set ap = active_page | default('') %}
<aside class="sidebar sidebar-modern" aria-label="Main navigation">
  <div class="sidebar-modern-brand">Abjad Super style tailor</div>

  <nav class="sidebar-modern-inner">
    <div class="sidebar-modern-scroll">
      <section class="sidebar-modern-section">
        <h2 class="sidebar-modern-section-title">DISCOVER</h2>
        <a href="/dashboard" class="sidebar-modern-link{% if ap == 'dashboard' %} is-active{% endif %}">
          <span class="sidebar-modern-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
          </span>
          <span class="sidebar-modern-label">Dashboard</span>
        </a>
      </section>

      <section class="sidebar-modern-section">
        <h2 class="sidebar-modern-section-title">INVENTORY</h2>
        <a href="/store" class="sidebar-modern-link{% if ap == 'products' %} is-active{% endif %}">
          <span class="sidebar-modern-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.27 6.96L12 12.01l8.73-5.05"/><path d="M12 22.08V12"/></svg>
          </span>
          <span class="sidebar-modern-label">Products</span>
        </a>
        <a href="/category-page" class="sidebar-modern-link{% if ap == 'category-page' or ap == 'categories' or ap == 'product-categories' %} is-active{% endif %}">
          <span class="sidebar-modern-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h10v10H7z"/><path d="M7 3h3"/><path d="M14 3h3"/><path d="M7 20h3"/><path d="M14 20h3"/><path d="M3 7v3"/><path d="M3 14v3"/><path d="M20 7v3"/><path d="M20 14v3"/></svg>
          </span>
          <span class="sidebar-modern-label">Category</span>
        </a>
        <a href="/orders" class="sidebar-modern-link{% if ap == 'orders' %} is-active{% endif %}">
          <span class="sidebar-modern-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          </span>
          <span class="sidebar-modern-label">Orders</span>
        </a>
        <a href="/stock" class="sidebar-modern-link{% if ap == 'stock' %} is-active{% endif %}">
          <span class="sidebar-modern-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M12 22.08V12"/><path d="M16 8h-6M13 11h4"/></svg>
          </span>
          <span class="sidebar-modern-label">Stock</span>
        </a>
        <a href="/customers" class="sidebar-modern-link{% if ap == 'customers' %} is-active{% endif %}">
          <span class="sidebar-modern-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </span>
          <span class="sidebar-modern-label">Customer</span>
          <span class="sidebar-modern-badge">NEW</span>
        </a>
        <a href="/measurements" class="sidebar-modern-link{% if ap == 'tailor_orders' %} is-active{% endif %}">
          <span class="sidebar-modern-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>
          </span>
          <span class="sidebar-modern-label">Tailor Orders</span>
          <span class="sidebar-modern-badge">NEW</span>
        </a>
      </section>

      <section class="sidebar-modern-section">
        <h2 class="sidebar-modern-section-title">FINANCES</h2>
        <a href="/transactions" class="sidebar-modern-link{% if ap == 'transactions' %} is-active{% endif %}">
          <span class="sidebar-modern-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          </span>
          <span class="sidebar-modern-label">Transactions</span>
        </a>
        <a href="/swap" class="sidebar-modern-link{% if ap == 'swap' %} is-active{% endif %}">
          <span class="sidebar-modern-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          </span>
          <span class="sidebar-modern-label">Swap</span>
        </a>
        <a href="/banks" class="sidebar-modern-link{% if ap == 'bank' %} is-active{% endif %}">
          <span class="sidebar-modern-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/><path d="M9 9v.01"/><path d="M9 12v.01"/><path d="M9 15v.01"/><path d="M9 18v.01"/></svg>
          </span>
          <span class="sidebar-modern-label">Bank</span>
        </a>
        <a href="/reports" class="sidebar-modern-link sidebar-modern-link--tight{% if ap == 'reports' %} is-active{% endif %}">
          <span class="sidebar-modern-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
          </span>
          <span class="sidebar-modern-label">Report</span>
          <span class="sidebar-modern-badge">NEW</span>
          <span class="sidebar-modern-chevron" aria-hidden="true">›</span>
        </a>

      </section>

      <div class="sidebar-modern-util">
        <a href="/settings" class="sidebar-modern-util-link{% if ap == 'settings' %} is-active{% endif %}">Settings</a>
        <a href="/staff" class="sidebar-modern-util-link nav-admin-only{% if ap == 'staff' %} is-active{% endif %}">Staff</a>
      </div>
    </div>
  </nav>

  <div class="sidebar-footer sidebar-modern-footer">
    <button type="button" class="sidebar-theme-btn" id="sidebarThemeBtn" title="Toggle theme" aria-label="Toggle theme"></button>
    <div class="sidebar-user">
      <div class="sidebar-user-avatar" id="sidebarUserAvatar"></div>
      <div class="sidebar-user-info">
        <span class="sidebar-user-name" id="sidebarUserName"></span>
        <span class="sidebar-user-role" id="sidebarUserRole">Admin</span>
      </div>
    </div>
    <a href="#" class="sidebar-logout" id="sidebarLogout" title="Sign out">Sign out</a>
  </div>
</aside>
