    <main class="main-content">
      <div class="page-content settings-page">
        <div class="settings-sections" style="max-width: 980px;">
          <section class="settings-section-card">
            <h3 class="settings-section-title" style="font-size:42px;">Profile Info</h3>
            <form id="profileForm">
              <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="profileName" class="search-input" required>
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" id="profileEmail" class="search-input" required>
              </div>
              <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="profilePhone" class="search-input">
              </div>
              <div class="form-actions settings-actions" style="justify-content:flex-start;">
                <button type="submit" class="btn btn-danger">Save Changes</button>
              </div>
            </form>
          </section>

          <section class="settings-section-card">
            <h3 class="settings-section-title" style="font-size:42px;">Change Password</h3>
            <form id="passwordForm">
              <div class="form-group">
                <label>Current Password</label>
                <input type="password" id="currentPassword" class="search-input" autocomplete="current-password" required>
              </div>
              <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword" class="search-input" autocomplete="new-password" required>
              </div>
              <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" class="search-input" autocomplete="new-password" required>
              </div>
              <div class="form-actions settings-actions" style="justify-content:flex-start;">
                <button type="submit" class="btn btn-secondary">Save Changes</button>
              </div>
            </form>
          </section>
        </div>

  <script src="/static/js/api.js"></script>

  <script src="/static/js/notifications.js"></script>
  <script>
    let user = requireAuth();
    if (!user) { throw new Error('Auth required'); }
    initAvatarFromApi(user);

    (function() {
      initTheme();
      var btn = document.getElementById('sidebarThemeBtn');
      if (btn) btn.addEventListener('click', toggleTheme);
    })();

    document.getElementById('sidebarLogout').addEventListener('click', function(e) {
      e.preventDefault();
      localStorage.removeItem('token');
      window.location.href = '/login';
    });
    // Profile display / edit (local save for UI)
    var profileName = document.getElementById('profileName');
    var profileEmail = document.getElementById('profileEmail');
    var profilePhone = document.getElementById('profilePhone');
    var profileKey = 'abjad_profile_overrides';
    var overrides = {};
    try { overrides = JSON.parse(localStorage.getItem(profileKey) || '{}') || {}; } catch (e) {}
    if (profileName) profileName.value = overrides.full_name || user.full_name || user.username || '';
    if (profileEmail) profileEmail.value = overrides.email || user.email || '';
    if (profilePhone) profilePhone.value = overrides.phone || user.phone || '';
    var profileForm = document.getElementById('profileForm');
    if (profileForm) {
      profileForm.addEventListener('submit', function (e) {
        e.preventDefault();
        var data = {
          full_name: profileName ? profileName.value.trim() : '',
          email: profileEmail ? profileEmail.value.trim() : '',
          phone: profilePhone ? profilePhone.value.trim() : ''
        };
        localStorage.setItem(profileKey, JSON.stringify(data));
        showToast('Profile info saved.', 'success');
      });
    }

    // Change password
    var passwordForm = document.getElementById('passwordForm');
    if (passwordForm) {
      passwordForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        var current = document.getElementById('currentPassword').value.trim();
        var next = document.getElementById('newPassword').value.trim();
        var confirm = document.getElementById('confirmPassword').value.trim();
        if (!current || !next || !confirm) {
          showToast('Please fill in all password fields.', 'error');
          return;
        }
        if (next.length < 6) {
          showToast('New password should be at least 6 characters.', 'error');
          return;
        }
        if (next !== confirm) {
          showToast('New passwords do not match.', 'error');
          return;
        }
        try {
          await api('/auth/change-password', {
            method: 'POST',
            body: JSON.stringify({ current_password: current, new_password: next })
          });
          passwordForm.reset();
          showToast('Password updated successfully.', 'success');
        } catch (err) {
          showToast(err.message || 'Failed to update password.', 'error');
        }
      });
    }

    // Notification settings section removed by design request
  </script>
